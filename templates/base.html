<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PrepMate — JSO Consultation Agent{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />
  {% block head %}{% endblock %}
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar__inner">
      <a href="/" class="navbar__logo">
        🎯 Prep<span>Mate</span>
        <span class="navbar__badge">JSO Phase-2</span>
      </a>
      <div class="navbar__steps">
        <div class="step-dot {% block step1 %}{% endblock %}"></div>
        <div class="step-dot {% block step2 %}{% endblock %}"></div>
        <div class="step-dot {% block step3 %}{% endblock %}"></div>
        <div class="step-dot {% block step4 %}{% endblock %}"></div>
      </div>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  {% block content %}{% endblock %}

  <!-- FOOTER -->
  <footer style="border-top:1px solid var(--border); padding:24px; text-align:center; margin-top:60px;">
    <p style="font-size:12px; color:var(--muted);">
      PrepMate &mdash; JSO Phase-2 Agentic Career Intelligence &nbsp;|&nbsp;
      Powered by <span style="color:var(--accent)">Google Gemini API</span> &nbsp;|&nbsp;
      Built for <span style="color:var(--accent)">AariyaTech UK</span>
    </p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
